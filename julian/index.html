<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Julian's Study Guides</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      color: #333;
      padding: 2rem 1rem;
    }
    .back {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: #555;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back:hover { color: #2c3e50; }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 1.5rem;
      color: #2c3e50;
    }
    .guide-list {
      list-style: none;
      max-width: 600px;
    }
    .guide-list li {
      margin-bottom: 0.75rem;
    }
    .guide-list a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: white;
      border-radius: 8px;
      padding: 0.9rem 1.25rem;
      text-decoration: none;
      color: #2c3e50;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: background 0.15s, box-shadow 0.15s;
      font-size: 1rem;
    }
    .guide-list a:hover {
      background: #eaf0fb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .icon { font-size: 1.2rem; }
    .empty {
      color: #888;
      font-style: italic;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <a class="back" href="../">&#8592; All Kids</a>
  <h1>Julian's Study Guides</h1>
  <p class="empty">No study guides yet.</p>
</body>
</html>
